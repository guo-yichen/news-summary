name: Daily Summary

on:
  schedule:
    - cron: "0 1 * * *"  # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        if: ${{ env.TWITTER_COOKIES != '' }}
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: playwright install chromium

      - name: Restore Twitter cookies
        if: ${{ env.TWITTER_COOKIES != '' }}
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
        run: echo "$TWITTER_COOKIES" | base64 -d > twitter_cookies.json

      - name: Restore dedup state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: news-summary-state-${{ github.run_id }}
          restore-keys: news-summary-state

      - name: Create sources.yaml
        env:
          SOURCES_YAML: ${{ secrets.SOURCES_YAML }}
        run: echo "$SOURCES_YAML" | tr -d '\n' | base64 -d > sources.yaml

      - name: Run summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OUTPUT_MODE: both
          NEWS_SUMMARY_STATE: ./state.json
        run: python -m src.runner

      - name: Commit summaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add summaries/
          git diff --cached --quiet || git commit -m "chore: daily summary $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
