# 复制为 sources.yaml 并填入你的信息源
# 将 sources.yaml 加入 .gitignore，不要把私密信息提交到 Git

# 输出语言：zh（中文）| en（English）| bilingual（中英双语交错）
language: zh

sources:
  # RSS 类（Substack、博客、YouTube、播客都支持 RSS）
  - type: rss
    name: "某 Substack"
    url: "https://xxx.substack.com/feed"
    max_entries: 3       # 每个源取最新几条，默认 3
    fetch_fulltext: true # 抓取文章正文（需要 trafilatura），默认 false
    fulltext_chars: 8000 # 正文最大字符数，默认 8000

  - type: rss
    name: "某博客"
    url: "https://example.com/feed.xml"
    max_entries: 5
    fetch_fulltext: true

  # YouTube 频道 RSS 格式: https://www.youtube.com/feeds/videos.xml?channel_id=CHANNEL_ID
  - type: rss
    name: "某 YouTube 频道"
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCxxxxxx"
    max_entries: 3

  # 播客 RSS
  - type: rss
    name: "某播客"
    url: "https://feeds.example.com/podcast"
    max_entries: 2

  # Twitter/X：用 Nitter 或 OpenRSS 转成 RSS
  # Nitter: https://nitter.net/username/rss
  # OpenRSS: https://openrss.org/twitter.com/username
  - type: rss
    name: "某 Twitter 博主"
    url: "https://nitter.net/username/rss"
    max_entries: 5

  # Email 订阅（需要 IMAP 配置）
  # - type: email
  #   name: "某 Newsletter"
  #   imap_server: "imap.gmail.com"
  #   email: "your@gmail.com"
  #   password: "your-app-password"  # Gmail 用应用专用密码
  #   folder: "INBOX"
  #   search_from: "newsletter@example.com"  # 可选：只取特定发件人
  #   max_emails: 5

  # ── YouTube 完整字幕（需要 SUPADATA_API_KEY，免费 100 credits/月）─────────
  # 注册: https://dash.supadata.ai
  # 每次运行取最近 lookback_hours 内最老的未看过一集，自动去重
  - type: youtube_transcript
    name: "Latent Space Podcast"
    channel_handle: "@latentspacepod"  # 频道 handle（二选一）
    # playlist_id: "PLxxxxxx"          # 或播放列表 ID
    lookback_hours: 72                 # 可选，默认 72h

  # ── follow-builders 中央 Feed（无需 API key，直接拉 GitHub）──────────────
  # 来源: https://github.com/zarazhangrui/follow-builders
  # 包含 Karpathy、Sam Altman 等 25 位 AI 大佬的推文（24h 内）

  - type: follow_builders_x
    name: "AI Builders Twitter"
    max_tweets_per_person: 3   # 每人最多取几条推文，默认 3

  # 包含 Latent Space、No Priors 等 5 个顶级 AI 播客（72h 内，含字幕）
  - type: follow_builders_podcasts
    name: "AI Podcasts"
    max_episodes: 2              # 最多取几集，默认 3
    transcript_chars: 15000      # 每集字幕截取前多少字，默认 15000

  # ── VC / 投资人信息源 ───────────────────────────────────────────────────────

  # Paul Graham（YC 联创）— 文章由社区维护的 RSS 抓取，官方 feed 已停更
  - type: rss
    name: "Paul Graham Essays"
    url: "https://program247365.github.io/paulgraham-rss/rss.xml"
    max_entries: 3
    fetch_fulltext: true
    fulltext_chars: 8000

  # Garry Tan（YC CEO）— YouTube 创业/投资分享
  - type: rss
    name: "Garry Tan (YC CEO) YouTube"
    url: "https://www.youtube.com/feeds/videos.xml?channel_id=UCIBgYfDjtWlbJhg--Z4sOgQ"
    max_entries: 3

  # Elad Gil（投资人，High Growth Handbook 作者）— Substack
  - type: rss
    name: "Elad Gil Blog"
    url: "https://blog.eladgil.com/feed"
    max_entries: 3
    fetch_fulltext: true
    fulltext_chars: 8000

  # Fred Wilson（Union Square Ventures）— AVC 博客，每日更新
  - type: rss
    name: "Fred Wilson (AVC)"
    url: "https://feeds.feedblitz.com/avcfeed"
    max_entries: 3
    fetch_fulltext: true
    fulltext_chars: 6000

  # Harry Stebbings（20VC 创始人）— Substack，VC 行业洞察
  - type: rss
    name: "Harry Stebbings (20VC)"
    url: "https://20vc.substack.com/feed"
    max_entries: 3
    fetch_fulltext: true
    fulltext_chars: 6000

# ── 推送渠道（可选）────────────────────────────────────────────────────────────
# 以下配置也可以通过环境变量传入（NOTION_TOKEN / TELEGRAM_BOT_TOKEN 等）

# Notion：在数据库中每天创建一个新页面
# 创建步骤：https://www.notion.so/my-integrations → New Integration → 复制 token
# 然后在数据库页面右上角 ... → Connections → 添加 Integration
# 复制数据库 URL 中的 32 位 ID（问号前那段，去掉连字符）
# notion:
#   token: "secret_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
#   database_id: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# Telegram：通过 bot 发送摘要到个人或群组
# 步骤：
# 1. 在 Telegram 搜索 @BotFather，发送 /newbot，获得 token
# 2. 向你的 bot 发一条消息
# 3. 访问 https://api.telegram.org/bot<TOKEN>/getUpdates
#    在 result[0].message.chat.id 找到你的 chat_id
# telegram:
#   bot_token: "123456789:AAFxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
#   chat_id: "123456789"   # 个人 chat ID 或群组负数 ID
